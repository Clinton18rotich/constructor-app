<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Constructor Super App Pro</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;overflow:hidden;background:#111827;-webkit-tap-highlight-color:transparent}
#root{height:100vh;overflow:hidden}
/* Sidebar */
.sb{position:fixed;top:0;left:0;width:260px;height:100vh;background:#1f2937;overflow-y:auto;z-index:50;transition:transform 0.3s;border-right:1px solid #374151}
.sb.closed{transform:translateX(-100%)}
.overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);z-index:40;display:none}
.overlay.show{display:block}
.hamburger{position:fixed;top:10px;left:10px;z-index:60;background:#1f2937;border:1px solid #374151;color:#f9fafb;font-size:22px;width:40px;height:40px;border-radius:10px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.sbh{padding:14px 16px;border-bottom:1px solid #374151;font-weight:bold;font-size:16px;color:#f9fafb;cursor:pointer}
.ph{padding:14px 16px;cursor:pointer;font-weight:bold;font-size:14px;color:#93c5fd;background:#111827;border-bottom:1px solid #374151;user-select:none}
.nl{display:block;padding:12px 16px 12px 36px;font-size:13px;color:#d1d5db;border-bottom:1px solid #1f2937;text-decoration:none;cursor:pointer}
.nl:active,.nl.ac{background:#1e3a5f;color:#60a5fa}
/* Main content */
.mn{flex:1;overflow-y:auto;padding:16px;height:100vh;-webkit-overflow-scrolling:touch}
/* Cards */
.cd{background:#1f2937;border-radius:14px;padding:16px;margin-bottom:12px}
.gr{display:grid;grid-template-columns:1fr;gap:12px}
.gr2{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.gr3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
/* Buttons */
.bt{padding:8px 14px;border-radius:8px;border:none;cursor:pointer;font-size:12px}
.bt:active{opacity:0.7}
.bt2{padding:10px 18px;border-radius:10px;border:none;cursor:pointer;font-size:14px;font-weight:600;width:100%}
.bt2:active{opacity:0.7}
.bt-icon{padding:6px;border-radius:8px;border:1px solid #374151;background:#111827;color:#f9fafb;cursor:pointer;font-size:16px;min-width:36px}
/* Inputs */
.inp{width:100%;padding:12px;border-radius:10px;border:1px solid #374151;background:#111827;color:#f9fafb;font-size:14px;margin-bottom:8px;-webkit-appearance:none}
.inp2{padding:12px;border-radius:10px;border:1px solid #374151;background:#111827;color:#f9fafb;font-size:14px;margin-bottom:8px;-webkit-appearance:none;flex:1}
.sel{width:100%;padding:12px;border-radius:10px;border:1px solid #374151;background:#111827;color:#f9fafb;font-size:14px;margin-bottom:8px;-webkit-appearance:none}
textarea.inp{resize:vertical;font-family:inherit}
.lbl{font-size:12px;color:#9ca3af;margin-bottom:4px;display:block}
/* Tags */
.tag{display:inline-block;padding:3px 8px;border-radius:9999px;font-size:10px;margin:2px;background:#374151;color:#d1d5db}
.tag.g{background:#065f46;color:#6ee7b7}
.tag.r{background:#7f1d1d;color:#fca5a5}
.tag.b{background:#1e3a5f;color:#93c5fd}
.tag.y{background:#78350f;color:#fcd34d}
.tag.p{background:#4a1d6e;color:#c4b5fd}
/* Typography */
h1{font-size:22px;font-weight:bold;color:#f9fafb;margin-bottom:4px}
h2{font-size:18px;font-weight:bold;color:#f9fafb;margin-bottom:4px}
h3{font-size:15px;font-weight:bold;color:#93c5fd;margin-bottom:10px}
h4{font-size:13px;font-weight:bold;color:#f9fafb;margin-bottom:6px}
p.sub{color:#9ca3af;font-size:13px;margin-bottom:16px}
.itm{display:block;padding:10px 0;font-size:13px;color:#f9fafb;border-bottom:1px solid #374151;text-decoration:none;cursor:pointer}
.row{display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end;margin-bottom:8px}
.col{flex:1;min-width:140px}
/* Progress */
.progress-bar{height:8px;background:#374151;border-radius:9999px;overflow:hidden;margin-top:4px}
.progress-fill{height:100%;border-radius:9999px}
/* Photos */
.photo-thumb{width:60px;height:60px;border-radius:8px;object-fit:cover;border:2px solid #374151;cursor:pointer;margin:4px}
.photo-grid{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px}
/* Notifications */
.notif-badge{position:fixed;top:10px;right:10px;z-index:60;background:#dc2626;color:white;border-radius:9999px;padding:4px 10px;font-size:12px;font-weight:bold;cursor:pointer}
.notif-panel{position:fixed;top:50px;right:10px;z-index:60;background:#1f2937;border:1px solid #374151;border-radius:14px;width:300px;max-height:400px;overflow-y:auto;display:none;padding:8px}
.notif-panel.show{display:block}
.notif-item{padding:8px;border-bottom:1px solid #374151;font-size:12px;color:#d1d5db;cursor:pointer}
.notif-item:hover{background:#374151}
/* Dashboard roles */
.role-tabs{display:flex;gap:4px;margin-bottom:12px;overflow-x:auto}
.role-tab{padding:8px 14px;border-radius:20px;border:1px solid #374151;background:transparent;color:#9ca3af;font-size:11px;cursor:pointer;white-space:nowrap}
.role-tab.active{background:#2563eb;color:white;border-color:#2563eb}
/* Offline indicator */
.offline-bar{position:fixed;top:0;left:0;width:100%;z-index:70;background:#f59e0b;color:#111827;text-align:center;padding:4px;font-size:12px;display:none}
.offline-bar.show{display:block}
/* Charts placeholder */
.chart-box{background:#111827;border-radius:8px;padding:20px;text-align:center;color:#9ca3af;font-size:12px;min-height:100px;display:flex;align-items:center;justify-content:center}
/* Modal */
.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);z-index:80;display:flex;align-items:center;justify-content:center}
.modal-inner{background:#1f2937;border-radius:14px;padding:20px;max-width:90vw;max-height:80vh;overflow-y:auto}
</style>
</head>
<body>
<div class="offline-bar" id="offlineBar">⚠️ Offline - Changes saved locally, will sync when connected</div>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
<script>
// ===================== SERVICE WORKER (Offline) =====================
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('/sw.js').catch(function(){});
}

// ===================== DATA STORE =====================
var appData=JSON.parse(localStorage.getItem('constructorData')||'{}');
var defaults={surveys:[],soilTests:[],gisLayers:[],finances:[],contracts:[],approvals:[],designBeams:[],designColumns:[],designSlabs:[],designFoundations:[],archNotes:[],waterPipes:[],drainPipes:[],electricalCircuits:[],transportSections:[],envAssessments:[],tempWorks:[],cadFiles:[],measurements:[],materials:[],boqItems:[],estimates:[],valueItems:[],lifecycleItems:[],purchaseOrders:[],awardedContracts:[],suppliers:[],plantItems:[],crewMembers:[],dailyLogs:[],programmeTasks:[],buildingTasks:[],pilingRecords:[],concreteMixes:[],labTests:[],safetyIncidents:[],ncrRecords:[],documents:[],siteDeliveries:[],communications:[],snags:[],asBuiltDocs:[],claimsItems:[],notifications:[],photos:{}};
Object.keys(defaults).forEach(function(k){if(!appData[k])appData[k]=defaults[k];if(!appData.concrete)appData.concrete=[];});
if(!appData.settings)appData.settings={role:'PM',darkMode:true,notifications:true};
function save(){localStorage.setItem('constructorData',JSON.stringify(appData));render();updateBadge();}

// ===================== NOTIFICATIONS =====================
function notify(title,type,module){
  appData.notifications.unshift({title:title,type:type||'info',module:module||'',time:new Date().toISOString(),read:false});
  if(appData.notifications.length>100)appData.notifications.length=100;
  save();
}
function updateBadge(){
  var unread=appData.notifications.filter(function(n){return !n.read;}).length;
  var badge=document.getElementById('notifBadge');
  if(badge){badge.textContent=unread;badge.style.display=unread>0?'block':'none';}
}
function toggleNotifications(){
  var panel=document.getElementById('notifPanel');
  panel.classList.toggle('show');
  if(panel.classList.contains('show')){
    var html='<h4 style="margin-bottom:8px">Notifications</h4>';
    if(!appData.notifications.length)html+='<p style="color:#9ca3af;font-size:12px">No notifications</p>';
    appData.notifications.slice(0,20).forEach(function(n,i){
      html+='<div class="notif-item" onclick="nav(\'/'+n.module+'\')" style="color:'+(n.read?'#9ca3af':'#f9fafb')+'"><b>'+n.title+'</b><br><span style="font-size:10px">'+new Date(n.time).toLocaleString()+'</span></div>';
    });
    panel.innerHTML=html;
    appData.notifications.forEach(function(n){n.read=true;});
    save();
  }
}

// ===================== PHOTO CAPTURE =====================
function capturePhoto(moduleId,itemIndex){
  var input=document.createElement('input');
  input.type='file';
  input.accept='image/*';
  input.capture='environment';
  input.onchange=function(e){
    var file=e.target.files[0];
    if(!file)return;
    var reader=new FileReader();
    reader.onload=function(ev){
      var key=moduleId+'_'+itemIndex;
      if(!appData.photos[key])appData.photos[key]=[];
      appData.photos[key].push({data:ev.target.result,time:new Date().toISOString()});
      save();
      notify('📸 Photo captured','success',moduleId);
    };
    reader.readAsDataURL(file);
  };
  input.click();
}

// ===================== OFFLINE DETECTION =====================
window.addEventListener('online',function(){document.getElementById('offlineBar').classList.remove('show');notify('✅ Back online - syncing','success');});
window.addEventListener('offline',function(){document.getElementById('offlineBar').classList.add('show');notify('⚠️ Offline mode - saving locally','warning');});

// ===================== PDF EXPORT =====================
function exportPDF(title,content){
  try{
    var win=window.open('','_blank','width=800,height=600');
    win.document.write('<html><head><title>'+title+'</title><style>body{font-family:sans-serif;padding:20px;color:#111}table{border-collapse:collapse;width:100%}th,td{border:1px solid #ddd;padding:8px;text-align:left}th{background:#f3f4f6}h1{font-size:18px}h2{font-size:14px}</style></head><body>'+content+'</body></html>');
    win.document.close();
    setTimeout(function(){win.print();},500);
  }catch(e){
    notify('PDF export requires popup permission','warning');
  }
}

// ===================== STATE =====================
var dark=true,openPhase=null,sidebarOpen=false;
function toggleSB(){sidebarOpen=!sidebarOpen;render();}
function closeSB(){sidebarOpen=false;render();}
function togglePhase(i){openPhase=openPhase===i?null:i;render();}
function getPath(){return window.location.hash.replace('#','')||'/';}
function nav(p){closeSB();window.location.hash='#'+p;}
window.onhashchange=function(){closeSB();render();};
function fmt(n){return (n||0).toLocaleString();}
function fmtDate(d){return new Date(d).toLocaleDateString();}
function pct(a,b){return b>0?Math.round(a/b*100):0;}

// ===================== ROUTES =====================
var phases=[
  {name:'A. Pre-Construction',items:[{id:'surveying',emoji:'📐',title:'Surveying & Setting Out'},{id:'geotechnical',emoji:'🌍',title:'Geotechnical Investigation'},{id:'gis',emoji:'🗺️',title:'GIS & Site Mapping'},{id:'finance',emoji:'📊',title:'Project Finance'},{id:'contracts',emoji:'⚖️',title:'Contracts & Procurement'},{id:'land',emoji:'🏛️',title:'Land & Approvals'}]},
  {name:'B. Design',items:[{id:'structures',emoji:'🏗️',title:'Structures (EC/BS)'},{id:'architectural',emoji:'🏛️',title:'Architectural'},{id:'water',emoji:'💧',title:'Water Supply'},{id:'drainage',emoji:'🚿',title:'Drainage'},{id:'electrical',emoji:'⚡',title:'Electrical'},{id:'transport',emoji:'🛣️',title:'Transport & Highway'},{id:'environmental',emoji:'🌱',title:'Environmental'},{id:'tempworks',emoji:'🏗️',title:'Temporary Works'},{id:'cad',emoji:'🎨',title:'CAD/BIM'}]},
  {name:'C. Measurement & Costing',items:[{id:'measurements',emoji:'📏',title:'Measurements'},{id:'materials',emoji:'🧱',title:'Materials'},{id:'quantity',emoji:'📊',title:'Quantity Survey'},{id:'estimating',emoji:'💰',title:'Estimating'},{id:'value',emoji:'💡',title:'Value Engineering'},{id:'lifecycle',emoji:'📈',title:'Life Cycle Costing'}]},
  {name:'D. Procurement',items:[{id:'procurement',emoji:'🏪',title:'Procurement'},{id:'award',emoji:'📜',title:'Contract Award'},{id:'suppliers',emoji:'🤝',title:'Suppliers'},{id:'plant',emoji:'🚜',title:'Plant & Equipment'},{id:'hr',emoji:'👷',title:'HR & Crew'}]},
  {name:'E. Construction',items:[{id:'construction',emoji:'📋',title:'Construction Mgt'},{id:'programme',emoji:'📅',title:'Programme'},{id:'building',emoji:'🧱',title:'Building Works'},{id:'substructure',emoji:'🔩',title:'Substructure'},{id:'lab',emoji:'🧪',title:'Materials Lab'},{id:'concrete',emoji:'🧱',title:'Concrete Tech'},{id:'safety',emoji:'⛑️',title:'Health & Safety'},{id:'quality',emoji:'✅',title:'Quality'},{id:'docs',emoji:'📄',title:'Doc Control'},{id:'logistics',emoji:'🚧',title:'Logistics'},{id:'stakeholder',emoji:'👥',title:'Stakeholder'}]},
  {name:'F. Close-Out',items:[{id:'snagging',emoji:'🔍',title:'Snagging & Defects'},{id:'asbuilt',emoji:'📦',title:'As-Built & Digital Twin'},{id:'reports',emoji:'📈',title:'Reports & Analytics'},{id:'claims',emoji:'⚖️',title:'Claims & Disputes'}]}
];

var pages={};
var forms={};

// Helper to create form pages
function makeForm(id,title,emoji,phase,fields,actions){
  pages[id]=function(){
    var h=emoji+'<h1>'+title+'</h1><p class="sub">'+phase+' Phase</p>';
    // Stats if data exists
    if(appData[id]&&appData[id].length){
      h+='<div class="gr2"><div class="cd" style="text-align:center"><h2 style="color:#60a5fa">'+appData[id].length+'</h2><p style="font-size:10px;color:#9ca3af">Records</p></div></div>';
    }
    // Add form
    h+='<div class="cd"><h4>+ Add New</h4><form onsubmit="submitForm(event,\''+id+'\')">';
    fields.forEach(function(f){
      if(f.type==='select'){
        h+='<select class="sel" id="'+id+'_'+f.id+'">';
        (f.options||[]).forEach(function(o){h+='<option>'+o+'</option>';});
        h+='</select>';
      }else if(f.type==='textarea'){
        h+='<textarea class="inp" id="'+id+'_'+f.id+'" placeholder="'+f.label+'" rows="2"></textarea>';
      }else{
        h+='<input class="inp" id="'+id+'_'+f.id+'" placeholder="'+f.label+'"'+(f.inputType?' type="'+f.inputType+'"':'')+(f.step?' step="'+f.step+'"':'')+'>';
      }
    });
    h+='<div class="row"><button type="submit" class="bt2" style="background:#2563eb;color:white;flex:1">+ Add</button>';
    h+='<button type="button" class="bt2" style="background:#059669;color:white;flex:1" onclick="exportModulePDF(\''+id+'\',\''+title+'\')">📄 Export PDF</button></div>';
    h+='</form></div>';
    // Data table
    if(appData[id]&&appData[id].length){
      h+='<div class="cd"><h3>📋 Records ('+appData[id].length+')</h3><table>';
      fields.forEach(function(f){h+='<th>'+f.label+'</th>';});
      h+='<th>Photos</th><th></th>';
      appData[id].forEach(function(item,i){
        h+='<tr>';
        fields.forEach(function(f){h+='<td>'+(item[f.id]||'')+'</td>';});
        // Photos
        var key=id+'_'+i;
        h+='<td>'+(appData.photos[key]?'📸×'+appData.photos[key].length:'')+' <button class="bt" style="font-size:10px;padding:2px 6px" onclick="event.stopPropagation();capturePhoto(\''+id+'\','+i+')">📷</button></td>';
        h+='<td><button class="bt" style="background:#dc2626;color:white;font-size:10px;padding:4px 8px" onclick="event.stopPropagation();deleteItem(\''+id+'\','+i+')">✕</button></td>';
        h+='</tr>';
        // Show photos if any
        if(appData.photos[key]&&appData.photos[key].length){
          h+='<tr><td colspan="'+(fields.length+2)+'"><div class="photo-grid">';
          appData.photos[key].forEach(function(p){h+='<img src="'+p.data+'" class="photo-thumb" onclick="showPhoto(\''+p.data+'\')">';});
          h+='</div></td></tr>';
        }
      });
      h+='</table></div>';
    }
    if(actions)actions.forEach(function(a){h+='<div class="cd"><h4>'+a.label+'</h4>'+a.content+'</div>';});
    return h;
  };
}

// Define all 40 modules with fields
var moduleDefs={};
moduleDefs.surveying={title:'Surveying & Setting Out',emoji:'📐',phase:'Pre-Construction',fields:[{id:'name',label:'Point Name'},{id:'east',label:'Easting (m)',inputType:'number',step:'0.001'},{id:'north',label:'Northing (m)',inputType:'number',step:'0.001'},{id:'elev',label:'Elevation (m)',inputType:'number',step:'0.001'},{id:'type',label:'Type',type:'select',options:['Control','Setting Out','Reference','Benchmark']}]};
moduleDefs.geotechnical={title:'Geotechnical Investigation',emoji:'🌍',phase:'Pre-Construction',fields:[{id:'borehole',label:'Borehole ID'},{id:'depth',label:'Depth (m)',inputType:'number',step:'0.1'},{id:'soilType',label:'Soil Type',type:'select',options:['Clay','Silt','Sand','Gravel','Rock','Mixed']},{id:'bearing',label:'Bearing Capacity (kPa)',inputType:'number'},{id:'spt',label:'SPT N-Value',inputType:'number'},{id:'notes',label:'Notes'}]};

moduleDefs.contracts={title:'Contracts & Procurement',emoji:'⚖️',phase:'Pre-Construction',fields:[{id:'name',label:'Contract Name'},{id:'type',label:'Contract Type',type:'select',options:['Lump Sum','Design & Build','JCT','NEC','FIDIC','Cost Plus']},{id:'value',label:'Value ($)',inputType:'number'}]};

moduleDefs.structures={title:'Structures (EC/BS)',emoji:'🏗️',phase:'Design',fields:[{id:'name',label:'Element ID'},{id:'type',label:'Type',type:'select',options:['Beam','Column','Slab','Foundation','Wall']},{id:'span',label:'Span/Length (m)',inputType:'number'},{id:'load',label:'Design Load (kN)',inputType:'number'},{id:'grade',label:'Grade',type:'select',options:['C25/30','C30/37','C35/45','C40/50','S275','S355']}]};

moduleDefs.water={title:'Water Supply Engineering',emoji:'💧',phase:'Design',fields:[{id:'name',label:'Pipe Run ID'},{id:'length',label:'Length (m)',inputType:'number'},{id:'dia',label:'Diameter (mm)',inputType:'number'},{id:'material',label:'Material',type:'select',options:['Copper','PEX','HDPE','Steel','PVC']},{id:'fixtures',label:'Fixtures Served'}]};
moduleDefs.drainage={title:'Drainage & Sewerage',emoji:'🚿',phase:'Design',fields:[{id:'name',label:'Drain Run ID'},{id:'length',label:'Length (m)',inputType:'number'},{id:'dia',label:'Diameter (mm)',inputType:'number'},{id:'gradient',label:'Gradient (1:X)',inputType:'number'},{id:'type',label:'Type',type:'select',options:['Foul','Surface Water','Combined']}]};
moduleDefs.electrical={title:'Electrical Design',emoji:'⚡',phase:'Design',fields:[{id:'name',label:'Circuit ID'},{id:'type',label:'Type',type:'select',options:['Lighting','Power','HVAC','Equipment','Fire Alarm']},{id:'load',label:'Load (W)',inputType:'number'},{id:'voltage',label:'Voltage (V)',inputType:'number'},{id:'phase',label:'Phase',type:'select',options:['Single','Three']}]};

function switchRole(role){appData.settings.role=role;save();notify('Switched to '+role+' dashboard','info');}
function generateQuickReport(type){
  var rep='<h2>'+type+'</h2><p>Date: '+fmtDate(new Date())+'</p><hr style="margin:12px 0;border-color:#374151">';
  if(type==='Progress Report'){rep+='<p><b>Total Records:</b> '+Object.keys(appData).filter(function(k){return Array.isArray(appData[k])}).reduce(function(s,k){return s+appData[k].length},0)+'</p><p><b>Daily Logs:</b> '+appData.dailyLogs.length+'</p><p><b>Tasks:</b> '+appData.programmeTasks.length+'</p><p><b>Building Activities:</b> '+appData.buildingTasks.length+'</p><p><b>Piles Installed:</b> '+appData.pilingRecords.length+'</p>';}
  else if(type==='Financial Summary'){rep+='<p><b>BOQ Items:</b> '+appData.boqItems.length+' - Total: $'+fmt(appData.boqItems.reduce(function(s,i){return s+(+i.qty||0)*(+i.rate||0)},0))+'</p><p><b>Purchase Orders:</b> '+appData.purchaseOrders.length+' - Total: $'+fmt(appData.purchaseOrders.reduce(function(s,p){return s+(+p.value||0)},0))+'</p><p><b>Claims:</b> '+appData.claimsItems.length+' - Total: $'+fmt(appData.claimsItems.reduce(function(s,c){return s+(+c.amount||0)},0))+'</p>';}
  else if(type==='Quality Report'){rep+='<p><b>NCRs:</b> '+appData.ncrRecords.length+' ('+appData.ncrRecords.filter(function(n){return n.status==='Open'}).length+' open)</p><p><b>Lab Tests:</b> '+appData.labTests.length+' ('+appData.labTests.filter(function(t){return t.result==='Pass'}).length+' passed)</p>';}
  else if(type==='Safety Report'){rep+='<p><b>Incidents:</b> '+appData.safetyIncidents.length+'</p><p><b>LTI:</b> '+appData.safetyIncidents.filter(function(s){return s.type==='Lost Time Injury'}).length+'</p><p><b>Near Misses:</b> '+appData.safetyIncidents.filter(function(s){return s.type==='Near Miss'}).length+'</p>';}
  else if(type==='Snag Status'){rep+='<p><b>Total Snags:</b> '+appData.snags.length+'</p><p><b>Open:</b> '+appData.snags.filter(function(s){return s.status==='Open'}).length+'</p><p><b>Closed:</b> '+appData.snags.filter(function(s){return s.status==='Closed'}).length+'</p><p><b>Completion:</b> '+pct(appData.snags.filter(function(s){return s.status==='Closed'}).length,appData.snags.length)+'%</p>';}
  else{rep+='<p><b>As-Built Docs:</b> '+appData.asBuiltDocs.length+' issued</p><p><b>Claims Resolved:</b> '+appData.claimsItems.filter(function(c){return c.status==='Resolved'}).length+'/'+appData.claimsItems.length+'</p><p><b>All Phases Complete:</b> '+(appData.snags.filter(function(s){return s.status==='Open'}).length===0?'Yes ✅':'No - snags remain')+'</p>';}
  document.getElementById('reportOutput').innerHTML='<div class="cd">'+rep+'<button class="bt2" style="background:#059669;color:white;margin-top:8px" onclick="exportPDF(\''+type+'\',\''+rep.replace(/'/g,"\\'")+'\')">📄 Export PDF</button></div>';
}

// ===================== ACTIONS =====================
function submitForm(e,id){
  e.preventDefault();
  var item={};
  var def=moduleDefs[id];
  def.fields.forEach(function(f){item[f.id]=document.getElementById(id+'_'+f.id).value;});
  item.date=new Date().toISOString();
  if(!appData[id])appData[id]=[];
  appData[id].push(item);
  save();
  notify('✅ Added to '+def.title,'success',id);
}
function deleteItem(id,i){
  if(confirm('Delete this record?')){
    appData[id].splice(i,1);
    // Also clean photos
    var key=id+'_'+i;
    if(appData.photos[key])delete appData.photos[key];
    save();
    notify('🗑️ Record deleted','warning',id);
  }
}
function showPhoto(data){var w=window.open('');w.document.write('<img src="'+data+'" style="max-width:100%">');}
function exportModulePDF(id,title){
  var h='<h1>'+title+'</h1><p>Exported: '+new Date().toLocaleString()+'</p><table><tr>';
  var def=moduleDefs[id];
  def.fields.forEach(function(f){h+='<th>'+f.label+'</th>';});
  h+='</tr>';
  (appData[id]||[]).forEach(function(item){h+='<tr>';def.fields.forEach(function(f){h+='<td>'+(item[f.id]||'')+'</td>';});h+='</tr>';});
  h+='</table>';
  exportPDF(title,h);
}

function designConcreteMix(){
  var fc=+document.getElementById("mx_strength").value||30;
  var slump=+document.getElementById("mx_slump").value||75;
  var agg=+document.getElementById("mx_agg").value||20;
  var wc=fc>=50?0.38:fc>=40?0.45:fc>=30?0.50:fc>=25?0.55:0.65;
  var water=agg===10?208:agg===20?195:180;
  if(slump>100)water+=15;if(slump<50)water-=15;
  var cement=Math.round(water/wc);
  var totalAgg=2200-cement-water;
  var faPct=agg===10?55:agg===20?45:35;
  var fa=Math.round(totalAgg*faPct/100);
  var ca=totalAgg-fa;
  document.getElementById("mixDesignResult").innerHTML="W/C: <b>"+wc.toFixed(2)+"</b> | Cement: <b>"+cement+" kg/m³</b> | Water: <b>"+water+" L</b> | FA: <b>"+fa+" kg</b> | CA: <b>"+ca+" kg</b><br><span style=\"font-size:11px;color:#9ca3af\">Ratio ~ 1:"+(fa/cement).toFixed(1)+":"+(ca/cement).toFixed(1)+" | Target: C"+fc+"/"+(fc+8)+"</span>";
}
function render(){
  var p=getPath();
  var h='';
  // Offline indicator
  h+='<div class="offline-bar'+(navigator.onLine?'':' show')+'" id="offlineBar">⚠️ Offline - Changes saved locally</div>';
  // Notification badge
  var unread=appData.notifications.filter(function(n){return !n.read;}).length;
  h+='<div class="notif-badge" id="notifBadge" style="display:'+(unread>0?'block':'none')+'" onclick="toggleNotifications()">'+unread+'</div>';
  h+='<div class="notif-panel" id="notifPanel"></div>';
  // Hamburger
  h+='<button class="hamburger" onclick="toggleSB()">'+(sidebarOpen?'✕':'☰')+'</button>';
  h+='<div class="overlay'+(sidebarOpen?' show':'')+'" onclick="closeSB()"></div>';
  // Sidebar
  h+='<div class="sb'+(sidebarOpen?'':' closed')+'"><div class="sbh" onclick="nav(\'/\')">🏗️ Constructor Pro</div>';
  phases.forEach(function(ph,i){
    h+='<div class="ph" onclick="togglePhase('+i+')">'+ph.name+' ('+ph.items.length+')</div>';
    if(openPhase===i)ph.items.forEach(function(it){h+='<a class="nl'+(p==='/'+it.id?' ac':'')+'" href="#/'+it.id+'" onclick="nav(\'/'+it.id+'\')">'+it.emoji+' '+it.title+'</a>';});
  });
  h+='</div>';
  // Main content
  h+='<div class="mn">';
  if(p==='/'){
    var t=phases.reduce(function(s,ph){return s+ph.items.length},0);
    var totalRecords=Object.keys(appData).filter(function(k){return Array.isArray(appData[k])}).reduce(function(s,k){return s+appData[k].length},0);
    h+='<h1>🏗️ CONSTRUCTOR PRO</h1><p class="sub">'+t+' Modules · '+totalRecords+' Records · Offline-Ready</p>';
    // Quick stat cards
    h+='<div class="gr3"><div class="cd" style="text-align:center"><h2 style="color:#60a5fa">'+totalRecords+'</h2><p style="font-size:10px;color:#9ca3af">Records</p></div><div class="cd" style="text-align:center"><h2 style="color:#34d399">'+appData.photos&&Object.keys(appData.photos).length||0+'</h2><p style="font-size:10px;color:#9ca3af">Photos</p></div><div class="cd" style="text-align:center"><h2 style="color:#fbbf24">'+appData.snags.filter(function(s){return s.status==='Open'}).length+'</h2><p style="font-size:10px;color:#9ca3af">Open Snags</p></div></div>';
    h+='<div class="gr">';
    phases.forEach(function(ph){h+='<div class="cd"><h3>'+ph.name+' ('+ph.items.length+')</h3>';ph.items.forEach(function(it){h+='<a class="itm" href="#/'+it.id+'" onclick="nav(\'/'+it.id+'\')">'+it.emoji+' '+it.title+'</a>';});h+='</div>';});
    h+='</div>';
  }else{
    var id=p.replace('/','');
    if(pages[id])h+=pages[id]();
    else h+='<h1>404</h1><a href="#/" onclick="nav(\'/\')" style="color:#60a5fa">← Back</a>';
  }
  h+='</div>';
  document.getElementById('root').innerHTML=h;
  updateBadge();
}
render();
</script>
</body>
</html>
